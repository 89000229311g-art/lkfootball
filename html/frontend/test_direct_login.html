<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прямой вход - Sunny Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #2a5298;
            margin-bottom: 30px;
            text-align: center;
        }
        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .role-btn {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 16px;
        }
        .role-btn:hover {
            border-color: #FFC107;
            background: #fffbf0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,193,7,0.3);
        }
        .role-btn.active {
            border-color: #FFC107;
            background: #FFC107;
            color: black;
            font-weight: bold;
        }
        .emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #FFC107;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: #ffca28;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,193,7,0.4);
        }
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
            display: block;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☀️ Sunny Football Academy</h1>
        
        <div class="role-grid">
            <button class="role-btn" onclick="selectRole('owner', '+373777777', '1')">
                <span class="emoji">👑</span>
                Руководитель
            </button>
            <button class="role-btn" onclick="selectRole('admin', '+373888888', '2')">
                <span class="emoji">🔧</span>
                Администратор
            </button>
            <button class="role-btn active" onclick="selectRole('coach', '+373999999', '3')">
                <span class="emoji">⚽</span>
                Тренер
            </button>
            <button class="role-btn" onclick="selectRole('parent', '+373666666', '4')">
                <span class="emoji">👪</span>
                Родитель
            </button>
        </div>

        <button class="login-btn" onclick="login()">Войти как Тренер</button>

        <div class="status" id="status"></div>

        <div class="info">
            <strong>Текущая роль:</strong> <span id="currentRole">Тренер (+373999999)</span><br>
            <strong>Пароль:</strong> <span id="currentPassword">3</span>
        </div>
    </div>

    <script>
        let selectedPhone = '+373999999';
        let selectedPassword = '3';
        let selectedRoleName = 'Тренер';

        function selectRole(role, phone, password) {
            selectedPhone = phone;
            selectedPassword = password;
            
            const roleNames = {
                'owner': 'Руководитель',
                'admin': 'Администратор',
                'coach': 'Тренер',
                'parent': 'Родитель'
            };
            selectedRoleName = roleNames[role];

            // Update UI
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.role-btn').classList.add('active');
            document.getElementById('currentRole').textContent = `${selectedRoleName} (${phone})`;
            document.getElementById('currentPassword').textContent = password;
            document.querySelector('.login-btn').textContent = `Войти как ${selectedRoleName}`;
        }

        async function login() {
            const statusDiv = document.getElementById('status');
            const loginBtn = document.querySelector('.login-btn');
            
            loginBtn.disabled = true;
            statusDiv.className = 'status loading';
            statusDiv.textContent = '🔄 Вход в систему...';

            try {
                // Step 1: Login
                const formData = new URLSearchParams();
                formData.append('username', selectedPhone);
                formData.append('password', selectedPassword);

                const loginResponse = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (!loginResponse.ok) {
                    throw new Error('Ошибка входа. Проверьте данные.');
                }

                const loginData = await loginResponse.json();
                const token = loginData.access_token;

                // Step 2: Get user info
                const userResponse = await fetch('http://localhost:8000/api/v1/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!userResponse.ok) {
                    throw new Error('Ошибка получения данных пользователя');
                }

                const userData = await userResponse.json();

                // Step 3: Save to localStorage
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(userData));

                statusDiv.className = 'status success';
                statusDiv.innerHTML = `✅ Успешный вход!<br>Роль: ${userData.role}<br>Имя: ${userData.full_name}`;

                // Step 4: Redirect to main app
                setTimeout(() => {
                    window.location.href = 'http://localhost:3002/';
                }, 1500);

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Ошибка: ${error.message}`;
                loginBtn.disabled = false;
            }
        }

        // Auto-login on page load (optional)
        // Uncomment the line below to auto-login as coach
        // window.addEventListener('load', () => setTimeout(login, 500));
    </script>
</body>
</html>
