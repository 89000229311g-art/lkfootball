<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Входа - Sunny Football Academy</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #1f2937;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #059669;
        }
        #result {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            word-break: break-all;
        }
        .success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #34d399;
        }
        .error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
        }
        .debug-info {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
            padding-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>☀️ Тест Входа</h1>
        <div class="form-group">
            <label>Номер телефона</label>
            <input type="text" id="phone" value="+37379000003" placeholder="+373...">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" value="parent123">
        </div>
        <button onclick="login()">Войти</button>
        
        <div id="result"></div>
        
        <div class="debug-info">
            <p>Тестовые данные:</p>
            <p>Родитель: +37379000003 / parent123</p>
            <p>Руководитель: +37379000001 / owner123</p>
        </div>
    </div>

    <script>
        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.textContent = 'Отправка запроса...';
            
            const formData = new URLSearchParams();
            formData.append('username', phone);
            formData.append('password', password);

            try {
                console.log('Sending request to http://localhost:8000/api/v1/auth/login');
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <strong>✅ Успешный вход!</strong><br>
                        Роль: ${parseJwt(data.access_token).role}<br>
                        Токен получен.
                    `;
                    // Save to local storage to test if main app picks it up
                    localStorage.setItem('token', data.access_token);
                    console.log('Token saved to localStorage');
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = `❌ Ошибка: ${data.detail || 'Неизвестная ошибка'}`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = `❌ Ошибка сети: ${error.message}. Убедитесь, что бэкенд запущен на порту 8000.`;
            }
        }

        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }
    </script>
</body>
</html>
