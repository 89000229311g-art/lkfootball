<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Login - Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 { margin: 0 0 20px 0; }
        .info { margin: 10px 0; font-size: 18px; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Автоматический вход</h1>
        <div class="info">👤 Администратор: Руководитель Академии</div>
        <div class="info">📱 Телефон: +373777777</div>
        <div class="info">🔑 Пароль: admin123</div>
        <div class="spinner"></div>
        <p id="status">Выполняется вход...</p>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        async function autoLogin() {
            const statusEl = document.getElementById('status');
            const errorEl = document.getElementById('error');
            
            try {
                statusEl.textContent = 'Отправка учетных данных...';
                
                // Create form data
                const formData = new URLSearchParams();
                formData.append('username', '+373777777');
                formData.append('password', 'admin123');
                
                // Login request
                const loginResponse = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });
                
                if (!loginResponse.ok) {
                    const errorData = await loginResponse.json();
                    throw new Error(errorData.detail || 'Login failed');
                }
                
                const data = await loginResponse.json();
                const token = data.access_token;
                
                statusEl.textContent = '✅ Вход выполнен успешно! Сохранение токена...';
                
                // Save token to localStorage
                localStorage.setItem('token', token);
                
                statusEl.textContent = '🚀 Перенаправление на панель управления...';
                
                // Redirect to frontend
                setTimeout(() => {
                    window.location.href = 'http://localhost:3004/';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                statusEl.textContent = '❌ Ошибка входа';
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                
                // Show manual login button
                const retryBtn = document.createElement('button');
                retryBtn.textContent = '🔄 Попробовать снова';
                retryBtn.style.cssText = 'margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; background: white; color: #667eea; border: none; border-radius: 5px;';
                retryBtn.onclick = () => location.reload();
                errorEl.appendChild(document.createElement('br'));
                errorEl.appendChild(document.createElement('br'));
                errorEl.appendChild(retryBtn);
                
                const manualBtn = document.createElement('button');
                manualBtn.textContent = '➡️ Перейти к форме входа';
                manualBtn.style.cssText = 'margin-left: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; background: white; color: #667eea; border: none; border-radius: 5px;';
                manualBtn.onclick = () => window.location.href = 'http://localhost:3004/login';
                errorEl.appendChild(manualBtn);
            }
        }
        
        // Auto-login on page load
        window.onload = autoLogin;
    </script>
</body>
</html>
