version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: football_academy_db
    restart: unless-stopped
    environment:
      TZ: Europe/Chisinau
      POSTGRES_USER: ${POSTGRES_USER:-football_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-football_academy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football_admin} -d ${POSTGRES_DB:-football_academy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_academy_backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Chisinau
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-football_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password_123}
      - POSTGRES_DB=${POSTGRES_DB:-football_academy}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-football_admin}:${POSTGRES_PASSWORD:-secure_password_123}@db:5432/${POSTGRES_DB:-football_academy}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - BACKEND_CORS_ORIGINS=["http://localhost","http://localhost:3000","http://localhost:3001","https://yourdomain.com"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: football_academy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    profiles:
      - production

volumes:
  postgres_data:
