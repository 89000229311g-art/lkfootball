# ============================================================
# Пример настройки для ВАШЕГО ОСНОВНОГО Nginx сервера
# Добавьте этот блок в конфиг сайта (например, /etc/nginx/sites-available/sunnyfootball.com)
# ============================================================

server {
    listen 80;
    server_name sunnyfootball.com www.sunnyfootball.com;

    # Редирект на HTTPS (если у вас настроен SSL на основном сервере)
    # return 301 https://$host$request_uri;
    
    location / {
        # Проксируем запросы на наш Docker-контейнер (порт 8090)
        proxy_pass http://localhost:8090;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Для WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

